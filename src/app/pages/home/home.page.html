<nc-container>

  <!-- title -->
   <section class="title-section mb-6 mt-8">
    <img 
      [src]="logoPath" 
      alt="Logo" 
      class="title-image"
    >
    <span class="page-title">
      <h1 class="page-title orbitron">NCSS ANGULAR</h1>
      <p class="page-subtitle mt-4 orbitron">Simple components. Just work.</p>
    </span>
  </section>
  <br><br>

  <!-- features -->
  <section class="features-section flex flex-wrap gap-6">
    <nc-card class="feature-card">
      <span class="flex flex-center circle border w-12 min-w-12 h-12">
        <nc-settings-icon color="var(--nc-input-placeholder-color-hover)"></nc-settings-icon>
      </span>
      <span>
        <h4 class="section-title-light mb-2">No Installation</h4>
        <p class="section-subtitle-light">Download and use without any installation.</p>
      </span>
    </nc-card>
    <nc-card class="feature-card">
      <span class="flex flex-center circle border w-12 min-w-12 h-12">
        <nc-npm-icon color="var(--nc-input-placeholder-color-hover)"></nc-npm-icon>
      </span>
      <span>
        <h4 class="section-title-light mb-2">No Dependencies</h4>
        <p class="section-subtitle-light">No external dependencies that break over time.</p>
      </span>
    </nc-card>
    <nc-card class="feature-card">
      <span class="flex flex-center circle border w-12 min-w-12 h-12">
        <nc-no-licence-icon color="var(--nc-input-placeholder-color-hover)"></nc-no-licence-icon>
      </span>
      <span>
        <h4 class="section-title-light mb-2">MIT Licence</h4>
        <p class="section-subtitle-light">Free to use in any project, commercial or personal.</p>
      </span>
    </nc-card>
  </section>
</nc-container>
