<nc-select
  #mySelect
  [options]="[
    { value: 'option1', label: 'Option 111111111112ekfnejfnhru3h3riu3griu32griu32iuri3dwjendkje' },
    { value: 'option2', label: 'Option 2' },
    { value: 'option3', label: 'Option 3' },
    { value: 'option4', label: 'Option 4' },
    { value: 'option5', label: 'Option 5' },
    { value: 'option6', label: 'Option 6' },
    { value: 'option7', label: 'Option 7' },
    { value: 'option8', label: 'Option 8' },
    { value: 'option9', label: 'Option 9' },
    { value: 'option10', label: 'Option 10' }
  ]"
  width="260px"
  optionsWidth="260px"
  [multiple]="true"
  [defaultValue]="['option1', 'option3']"
  [onChange]="onSelectChange.bind(this)"
  class="custom-class-added-to-select"
  [style]="{transform: 'translateX(50px)'}"
  name="my-select"
  id="my-select"
>
  Select an option => this should not overflow
</nc-select>


<br>

<h3>From html</h3>
<button (click)="mySelect.setValue(['option4', 'option5'])">Set Value to Option 4 & 5</button><br>
<button (click)="mySelect.clear()">Clear Value</button><br>

<h3>from ts</h3>
<button (click)="getSelectedValue()">Get Selected Value</button><br>
<button (click)="setSelectedValue(['option1', 'option2'])">Set Value to Option 1 & 2</button><br>
<button (click)="clearSelectedValue()">Clear Value</button><br>
<button (click)="clearSelectedValue()">Clear Value</button><br>
