<button 
    [style]="style"
    [style.width]="width ? width : ''"
    [class]="'nc-button ' + class + ' ' + 'nc-button-' + variant"
    [id]="id"
    [disabled]="disabled"
    [type]="type"
    (click)="onClick && onClick()"
    [attr.aria-label]="ariaLabel"
    [attr.title]="title"
>
    <ng-content></ng-content>
</button>
