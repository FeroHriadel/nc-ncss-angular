
<nc-topnav 
  [links]="[
    { 
      label: 'Forms', 
      hasOptions: true, 
      options: [
        { label: 'Form Elements', value: 'inputs' },
        { label: 'Buttons', value: 'inputs/buttons' },
        { label: 'Checkbox', value: 'inputs/checkbox' },
        { label: 'File Upload', value: 'inputs/file-upload' },
        { label: 'Form Service', value: 'inputs/form-service' },
        { label: 'Select', value: 'inputs/select' },
        { label: 'Text Inputs', value: 'inputs/text-inputs' },
      ] 
    },
    {
      label: 'Layout',
      link: '/layout'
      
    },
    {
      label: 'Lists',
      link: '/lists'
    },
    { 
      label: 'Navs', 
      link: '/navs' 
    },
    { 
      label: 'Pills', 
      link: '/pills' 
    },
    { 
      label: 'PopUps', 
      link: '/popups' 
    },
    {
      label: 'Tables',
      link: '/tables',
    }
  ]"
>
  <span slot="logo" (click)="redirectHome()" class="pointer">
    <img [src]="logoPath" alt="Logo" [width]="50" [style]="{transform: 'translate(-5px, 3px)'}">
  </span>
  <nc-select 
    slot="custom" 
    class="mr-2"
    [options]="[
      { label: 'Light', value: 'light' },
      { label: 'Dark', value: 'dark' },
    ]"
    defaultValue="light"
    [customTrigger]="true"
    [width]="'fit-content'"
    [onChange]="changeTheme"
  >
    <nc-square-button>
      <nc-pallete-icon [size]="20"></nc-pallete-icon>
    </nc-square-button>
  </nc-select>
</nc-topnav>
